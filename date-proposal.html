<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Will you be my date? 💖</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Dancing+Script:wght@600&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Playfair Display', serif;
        }
        .romantic-font {
            font-family: 'Dancing Script', cursive;
        }
        .heart {
            animation: heartbeat 1.5s infinite;
        }
        @keyframes heartbeat {
            0% { transform: scale(1); }
            50% { transform: scale(1.3); }
            100% { transform: scale(1); }
        }
        .no-btn {
            transition: all 0.4s cubic-bezier(0.68, -0.55, 0.27, 1.55);
        }
        .rose-bg {
            background: linear-gradient(135deg, #fce7f3 0%, #fdf4ff 100%);
        }
    </style>
</head>
<body class="rose-bg min-h-screen flex items-center justify-center overflow-hidden relative">
    <!-- Floating hearts -->
    <div class="absolute inset-0 pointer-events-none" id="hearts"></div>

    <!-- Main Screen -->
    <div id="main-screen" class="max-w-lg w-full mx-auto text-center px-6 py-12 z-10">
        <div class="mb-8">
            <span class="text-6xl heart inline-block">💖</span>
        </div>
        
        <h1 class="text-5xl md:text-6xl font-bold text-pink-600 mb-4 tracking-tight">
            Will you be my date?
        </h1>
        
        <p class="text-2xl text-pink-500 romantic-font mb-12">
            Hey wifeeyyy ❤️
        </p>

        <div class="flex flex-col sm:flex-row gap-6 justify-center items-center">
            <!-- Yes Button -->
            <button onclick="sayYes()" 
                    class="yes-btn bg-pink-500 hover:bg-pink-600 text-white text-2xl font-semibold px-16 py-8 rounded-3xl shadow-xl transform hover:scale-110 transition-all duration-300 active:scale-95">
                Yes 💕
            </button>

            <!-- No Button -->
            <button id="no-btn"
                    class="no-btn bg-white border-4 border-pink-300 text-pink-500 text-2xl font-semibold px-12 py-8 rounded-3xl shadow-xl hover:bg-pink-50">
                No 😢
            </button>
        </div>

        <p id="message" class="mt-12 text-lg text-pink-400 font-medium min-h-[2.5rem]"></p>
    </div>

    <!-- Success Screen -->
    <div id="success-screen" class="hidden fixed inset-0 bg-gradient-to-br from-pink-400 to-purple-500 flex items-center justify-center z-50">
        <div class="text-center px-6">
            <div class="text-8xl mb-6 animate-bounce">🎉</div>
            <h1 class="text-6xl md:text-7xl font-bold text-white mb-6 romantic-font tracking-wide">
                Yay! ❤️ I LOVVEEEEEEEEE YOUUUUUUUUU SOOOO MUCHHHHHH BABBYYYYYYYYYYY~ BY MAAZ
            </h1>
            <p class="text-3xl text-white/90 mb-10 romantic-font">
                I'm the luckiest person alive!
            </p>
            <p class="text-4xl text-white font-bold mb-12">
                See you there, my love ✨
            </p>
            
            <button onclick="restart()" 
                    class="bg-white text-pink-500 px-10 py-6 rounded-3xl text-2xl font-semibold hover:bg-pink-100 transition">
                Ask me again 💖
            </button>
        </div>
    </div>

    <script>
        const noBtn = document.getElementById('no-btn');
        const messageEl = document.getElementById('message');
        let noClickCount = 0;

        // Funny messages when clicking No
        const noMessages = [
            "Are you sure? 🥺",
            "But I made a playlist for us...",
            "Think again, please? 💕",
            "My heart is breaking a little...",
            "What if I bring flowers? 🌹",
            "You're too cute to say no~",
            "Okay... last chance? 😭"
        ];

        // Move No button to random position
        function moveNoButton() {
            const maxX = window.innerWidth - noBtn.offsetWidth - 50;
            const maxY = window.innerHeight - noBtn.offsetHeight - 100;
            
            const randomX = Math.random() * maxX;
            const randomY = Math.random() * maxY + 100; // Keep it away from top
            
            noBtn.style.position = 'fixed';
            noBtn.style.left = `${randomX}px`;
            noBtn.style.top = `${randomY}px`;
        }

        // Hover effect on No button
        noBtn.addEventListener('mouseenter', () => {
            moveNoButton();
        });

        // Click on No button
        noBtn.addEventListener('click', () => {
            noClickCount++;
            moveNoButton();
            
            // Show cute message
            if (noClickCount <= noMessages.length) {
                messageEl.textContent = noMessages[noClickCount - 1];
            } else {
                messageEl.textContent = "You're really good at this game 😭";
            }
        });

        function sayYes() {
            document.getElementById('main-screen').classList.add('hidden');
            document.getElementById('success-screen').classList.remove('hidden');
            
            // Create lots of floating hearts
            createFloatingHearts(30);
        }

        function createFloatingHearts(count) {
            const container = document.getElementById('hearts');
            for (let i = 0; i < count; i++) {
                const heart = document.createElement('div');
                heart.textContent = ['💖', '❤️', '💗', '💘', '💝'][Math.floor(Math.random()*5)];
                heart.style.position = 'absolute';
                heart.style.fontSize = `${Math.random() * 30 + 20}px`;
                heart.style.left = `${Math.random() * 100}vw`;
                heart.style.top = `${Math.random() * 100}vh`;
                heart.style.opacity = Math.random() * 0.7 + 0.3;
                heart.style.animation = `floatUp ${Math.random() * 4 + 4}s linear forwards`;
                container.appendChild(heart);
                
                setTimeout(() => heart.remove(), 8000);
            }
        }

        // Add floating animation
        const style = document.createElement('style');
        style.innerHTML = `
            @keyframes floatUp {
                to {
                    transform: translateY(-120vh);
                    opacity: 0;
                }
            }
        `;
        document.head.appendChild(style);

        function restart() {
            document.getElementById('success-screen').classList.add('hidden');
            document.getElementById('main-screen').classList.remove('hidden');
            noClickCount = 0;
            messageEl.textContent = '';
            noBtn.style.position = 'static';
        }

        // Make it responsive and cute on mobile
        window.addEventListener('resize', () => {
            if (noBtn.style.position === 'fixed') {
                moveNoButton();
            }
        });

        // Initial floating hearts
        setTimeout(() => createFloatingHearts(8), 600);
    </script>
</body>
</html>
